name: Publish CMS content

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write

concurrency:
  group: okubo-cms-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.issue.user.login == 'makoban' && startsWith(github.event.issue.title, '[CMS Publish]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Save submitted content
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            fs.writeFileSync("cms-issue-body.txt", context.payload.issue.body || "", "utf8");

      - name: Validate and apply content
        run: node scripts/apply-cms-payload.mjs cms-issue-body.txt

      - name: Commit site content
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review-data.js review/review-data.js
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update clinic content from dashboard"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request GitHub Pages build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

      - name: Close request
        uses: actions/github-script@v7
        env:
          CONTENT_CHANGED: ${{ steps.commit.outputs.changed }}
        with:
          script: |
            const changed = process.env.CONTENT_CHANGED === "true";
            const message = changed
              ? "本番用データを更新し、GitHub Pagesの公開処理を開始しました。"
              : "本番用データはすでに同じ内容でした。";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
